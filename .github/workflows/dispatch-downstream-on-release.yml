# Dispatch downstream sites on successful PyPI release.
#
# Fires AFTER `specterqa-ios-publish.yml` completes successfully on a
# `simdrive-v*` tag. Sends `repository_dispatch` events to:
#   - SyncTek-LLC/simdrive-site   (Astro -> Cloudflare Pages)
#   - SyncTek-LLC/simdrive-docs   (Mintlify auto-deploy on push to main)
#
# Payload (client_payload):
#   version                 e.g. "1.0.0b6"
#   tag                     e.g. "simdrive-v1.0.0b6"
#   pypi_url                PyPI release URL
#   release_url             GitHub release URL
#   changelog_section_b64   base64-encoded CHANGELOG section for this version
#
# Why we include the CHANGELOG section in the payload:
#   This engine repo is PRIVATE. Earlier design had downstreams fetching
#   `raw.githubusercontent.com/.../simdrive/CHANGELOG.md` unauthenticated --
#   that 404s on a private repo (b5 fan-out blew up this way). The
#   DOWNSTREAM_DISPATCH_PAT is scoped to downstream contents:write only,
#   not engine contents:read; we don't want to widen its blast radius
#   just so two workflows can read a CHANGELOG. So the engine workflow
#   (which has full checkout access at the tag) extracts the section
#   and ships it in the dispatch payload. Base64 avoids the JSON-escape
#   pain of multiline markdown.
#
# SECRETS REQUIRED:
#   DOWNSTREAM_DISPATCH_PAT  -- fine-grained PAT with `contents: read+write`
#                              and `metadata: read` on simdrive-site AND
#                              simdrive-docs.

name: Dispatch downstream sites on release

on:
  workflow_run:
    workflows: ["simdrive Publish to PyPI"]
    types: [completed]
    branches-ignore: []
  # Manual-trigger path for end-to-end validation WITHOUT cutting a real
  # release tag. Lets us re-fire the fan-out for an already-published
  # version, or rehearse with `dry_run=true` to build + log the payload
  # but skip the actual repository_dispatch calls.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0b5) — must exist as a CHANGELOG section'
        required: true
        type: string
      tag:
        description: 'Tag (e.g. simdrive-v1.0.0b5) — checkout ref + payload'
        required: true
        type: string
      dry_run:
        description: 'If true, build payload + log it but skip repository_dispatch'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  dispatch:
    name: repository_dispatch -> site + docs
    # Only fire when the upstream publish workflow succeeded AND was
    # triggered by a tag push (workflow_run path). For workflow_dispatch
    # the operator is explicitly invoking the workflow, so always run.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'simdrive-v'))
    runs-on: ubuntu-latest
    steps:
      - name: Compute payload (version, urls)
        id: payload
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_REF: ${{ github.event.workflow_run.head_branch }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            VERSION="$INPUT_VERSION"
            # Sanity: tag should encode the version (avoids operator typos
            # silently dispatching the wrong combo).
            if [ "$TAG" != "simdrive-v$VERSION" ]; then
              echo "::error::tag '$TAG' does not match expected 'simdrive-v$VERSION'"
              exit 1
            fi
          else
            # head_branch on a tag-push run is the tag name itself.
            TAG="$RUN_REF"
            VERSION="${TAG#simdrive-v}"
          fi
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "pypi_url=https://pypi.org/project/simdrive/${VERSION}/"  >> "$GITHUB_OUTPUT"
          echo "release_url=https://github.com/SyncTek-LLC/simdrive/releases/tag/${TAG}" >> "$GITHUB_OUTPUT"
          echo "resolved tag=$TAG version=$VERSION (event=$EVENT_NAME)"

      - name: Checkout engine at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.payload.outputs.tag }}
          fetch-depth: 1

      - name: Extract + base64-encode CHANGELOG section
        id: section
        env:
          VERSION: ${{ steps.payload.outputs.version }}
        run: |
          set -euo pipefail
          if [ ! -f simdrive/CHANGELOG.md ]; then
            echo "::error::simdrive/CHANGELOG.md not found at tag"
            exit 1
          fi
          # Extract the section for VERSION via Node (same regex as
          # downstream apply-release.mjs, so behaviour is identical).
          # Single-shot file write; no shell quoting of multiline markdown.
          #
          # Also runs sanitizeForPublic() -- a strip-filter that redacts
          # internal context (initiative IDs, internal paths, customer
          # codenames, internal department names) so downstream payload
          # carries the customer-safe form even if an author writes for
          # the internal audience by habit. This MIRRORS the same
          # function in the simdrive-site repo's apply-release.mjs; both
          # apply for defense-in-depth (engine-side strips before the
          # payload leaves; site-side strips again on render). Keep the
          # two copies in sync when adding rules.
          #
          # The script is written to a temp file and run with `node FILE`
          # (rather than `node --eval`) because the sanitizer body uses
          # both single- and double-quoted JS strings; --eval needs the
          # whole script in one shell-quoted blob and would clash.
          cat > /tmp/extract-section.mjs <<"NODESCRIPT"
          import { promises as fs } from "node:fs";
          const VERSION = process.env.VERSION;
          const text = await fs.readFile("simdrive/CHANGELOG.md", "utf8");
          const escapeRegex = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const re = new RegExp(
            "(##\\s*\\[?" + escapeRegex(VERSION) + "\\]?[^\\n]*\\n[\\s\\S]*?)(?=\\n##\\s*\\[|$)",
          );
          const m = text.match(re);
          if (!m) {
            console.error("section for " + VERSION + " not found in CHANGELOG.md");
            process.exit(2);
          }
          function sanitizeForPublic(input) {
            const DROP = [
              /^\s*\[internal-tracker\]/,
              /^\s*Reported by .+\(.*Palace.*\)/i,
              /Reported by Maurice Carrier/i,
            ];
            const REDACT = [
              [/\s*\[?INIT-\d{4}-\d+(?:\s+P\d+)?\]?\.?/g, ""],
              [/\s*\[internal-tracker\]\.?/g, ""],
              [/CompanyState\/[^\s).,;]+/g, "internal report"],
              [/\/Users\/atlas\/\S+/g, "<path>"],
              [/\b(?:Business|Code|Deploy|Security|Quality|Test|VA|TechWriter|DevRel|Legal|Operations|Product|Verify|Marketing)Atlas\b/g, "the team"],
              [/\bAtlas CEO\b/g, "the team"],
              [/\bforgeos(?:-engine)?\b/gi, "the build system"],
              [/\bMaurice Carrier\b/g, "a user"],
              [/\bMaurice(?:\s*\/\s*Palace)?\b/g, "a user"],
              [/\bMoe'?s Max\b/g, "a real device"],
              [/\bPalace iOS team\b/g, "early adopters"],
              [/\bPalace dogfood/g, "dogfood"],
              [/\bPalace's\b/g, "an early adopter's"],
              [/\bPalace\b/g, "early adopters"],
              [/\bSpecterQA(?:'s)?\b/g, "the predecessor project"],
              [/\bsub-?agent\b/gi, "automated"],
              [/\bbackend team\b/gi, "maintainer"],
              [/\bChairman\b/g, "the maintainer"],
            ];
            const kept = [];
            for (const line of input.split("\n")) {
              if (DROP.some((re) => re.test(line))) continue;
              let r = line;
              for (const [p, repl] of REDACT) r = r.replace(p, repl);
              r = r
                .replace(/\(\s*[,;]?\s*\)/g, "")
                .replace(/\[\s*\]/g, "")
                .replace(/[ \t]{2,}/g, " ")
                .replace(/\s+([.,;])/g, "$1")
                .replace(/\bA\s+(automated|internal)\b/g, "An $1")
                .replace(/\ba\s+(automated|internal)\b/g, "an $1")
                .replace(/\s+$/g, "");
              kept.push(r);
            }
            return kept.join("\n").replace(/\n{3,}/g, "\n\n").trim();
          }
          const raw = m[1].trim();
          const sanitized = sanitizeForPublic(raw);
          await fs.writeFile(".release-section.md", sanitized + "\n");
          console.error("extracted " + raw.length + " raw -> " + sanitized.length + " sanitized for " + VERSION);
          NODESCRIPT
          node /tmp/extract-section.mjs
          # Base64-encode the section. -w0 disables wrapping (GNU base64);
          # on macOS that flag is unknown, but this runs on ubuntu-latest.
          SECTION_B64="$(base64 -w0 .release-section.md)"
          # Emit via heredoc to handle any unlikely shell-sensitive chars
          # even though base64 output is shell-safe by construction.
          {
            echo "section_b64<<EOF_SECTION"
            echo "$SECTION_B64"
            echo "EOF_SECTION"
          } >> "$GITHUB_OUTPUT"
          echo "section bytes (encoded): ${#SECTION_B64}"

      - name: Write payload JSON to file
        id: payload_json
        env:
          VERSION: ${{ steps.payload.outputs.version }}
          TAG: ${{ steps.payload.outputs.tag }}
          PYPI_URL: ${{ steps.payload.outputs.pypi_url }}
          RELEASE_URL: ${{ steps.payload.outputs.release_url }}
          SECTION_B64: ${{ steps.section.outputs.section_b64 }}
        run: |
          set -euo pipefail
          # Build JSON with Node to escape any control chars safely.
          # SECTION_B64 is already base64 (shell-safe alphanumerics + /+=)
          # but JSON.stringify ensures correctness if anything upstream
          # changes the encoding.
          node --eval '
            const fs = require("fs");
            const payload = {
              version:               process.env.VERSION,
              tag:                   process.env.TAG,
              pypi_url:              process.env.PYPI_URL,
              release_url:           process.env.RELEASE_URL,
              changelog_section_b64: process.env.SECTION_B64,
            };
            fs.writeFileSync(".dispatch-payload.json", JSON.stringify(payload));
            console.error("payload bytes: " + fs.statSync(".dispatch-payload.json").size);
          '

      - name: Dispatch -> simdrive-site
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        env:
          PAT: ${{ secrets.DOWNSTREAM_DISPATCH_PAT }}
        run: |
          set -euo pipefail
          # Build the dispatches API body: { event_type, client_payload }
          BODY="$(node --eval '
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync(".dispatch-payload.json", "utf8"));
            process.stdout.write(JSON.stringify({
              event_type: "simdrive-release",
              client_payload: payload,
            }));
          ')"
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/SyncTek-LLC/simdrive-site/dispatches \
            -d "$BODY"
          echo "dispatched simdrive-release -> simdrive-site"

      - name: Dispatch -> simdrive-docs
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        env:
          PAT: ${{ secrets.DOWNSTREAM_DISPATCH_PAT }}
        run: |
          set -euo pipefail
          BODY="$(node --eval '
            const fs = require("fs");
            const payload = JSON.parse(fs.readFileSync(".dispatch-payload.json", "utf8"));
            process.stdout.write(JSON.stringify({
              event_type: "simdrive-release",
              client_payload: payload,
            }));
          ')"
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/SyncTek-LLC/simdrive-docs/dispatches \
            -d "$BODY"
          echo "dispatched simdrive-release -> simdrive-docs"

      - name: Summary
        env:
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN: ${{ inputs.dry_run }}
          VERSION: ${{ steps.payload.outputs.version }}
          TAG: ${{ steps.payload.outputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY_RUN" = "true" ]; then
            echo "Dry run: payload prepared, dispatch skipped (version=$VERSION tag=$TAG)"
          else
            echo "Payload sent to 2 downstream(s) with version=$VERSION tag=$TAG"
          fi
