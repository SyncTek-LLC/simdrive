name: specterqa-ios Publish to PyPI

on:
  push:
    tags:
      - "specterqa-ios-v*.*.*"
      - "specterqa-ios-v*.*.*a*"
      - "specterqa-ios-v*.*.*b*"
      - "specterqa-ios-v*.*.*rc*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, no publish)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist (universal2)
    runs-on: macos-14
    defaults:
      run:
        working-directory: simdrive

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build native HID helper (universal2)
        run: cd native && make clean && make

      - name: Verify universal2 binary
        run: |
          file src/specterqa_ios/_bin/simdrive-input
          file src/specterqa_ios/_bin/simdrive-input | grep -q "universal binary"

      - name: Install build tools
        run: pip install build twine

      - name: Build distributions
        env:
          SIMDRIVE_SKIP_NATIVE_BUILD: "1"
        run: python -m build

      - name: Verify dist contents
        run: |
          ls -la dist/
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: specterqa-ios-dist
          path: simdrive/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/specterqa-ios-v') && !inputs.dry_run }}
    # PyPI Trusted Publishers (OIDC) — no token needed.
    # Configure once at: https://pypi.org/manage/account/publishing/
    #   project name:  specterqa-ios
    #   owner:         SyncTek-LLC
    #   repo:          specterqa-ios
    #   workflow:      specterqa-ios-publish.yml
    #
    # NOTE: This workflow filename changed from `simdrive-publish.yml` to
    # `specterqa-ios-publish.yml` as part of the v17 rename. PyPI Trusted
    # Publisher entries are pinned to (project, owner, repo, workflow). A NEW
    # entry for project=`specterqa-ios` matching this workflow filename must
    # be configured before the first 17.0.0a1 publish — same 2-minute setup as
    # the original `simdrive` entry.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: specterqa-ios-dist
          path: dist/

      - name: Publish to PyPI (via Trusted Publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
