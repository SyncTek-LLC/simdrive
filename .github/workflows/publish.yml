name: Build and Publish to GitHub Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, no publish)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write  # for trusted publishing (PyPI OIDC)

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.extract_version.outputs.version }}
          path: dist/
          if-no-files-found: error

  publish-github-packages:
    name: Publish to GitHub Packages (PyPI index)
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    environment:
      name: github-packages
      url: https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/packages

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install twine
        run: pip install twine

      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TWINE_REPOSITORY_URL: https://maven.pkg.github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}
        run: twine upload --skip-existing dist/*

  publish-pypi:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run }}
    environment:
      name: pypi
      url: https://pypi.org/project/specterqa-ios/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
