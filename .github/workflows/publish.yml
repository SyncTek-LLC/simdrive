name: Build and Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, no publish)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Clean stale build artifacts
        run: rm -rf build dist

      - name: Build wheel and sdist
        run: python -m build

      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.extract_version.outputs.version }}
          path: dist/
          if-no-files-found: error

  verify-wheel:
    name: Verify wheel buildability (catches package-data drift)
    needs: build
    runs-on: macos-14
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fresh-venv install + runner build smoke test
        run: |
          set -euo pipefail
          python3.11 -m venv /tmp/wheel-verify
          /tmp/wheel-verify/bin/pip install --quiet dist/specterqa_ios-*.whl
          # Must be a directory with NO .xcodeproj — proves CLI finds bundled runner
          mkdir -p /tmp/empty-cwd
          cd /tmp/empty-cwd
          /tmp/wheel-verify/bin/specterqa-ios runner build
          echo "✅ wheel produces working .xctestrun from fresh install"

  publish-pypi:
    name: Publish to PyPI
    needs: [build, verify-wheel]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI }}
          skip-existing: true
