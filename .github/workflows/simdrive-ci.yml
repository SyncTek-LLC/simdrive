name: simdrive CI

# INIT-2026-549 W1: expanded test gate.
# - Runs `pytest simdrive/tests -m "not live"` (was: tests/test_unit.py only).
# - Enforces a coverage ratchet floor on the hot-path modules (see simdrive/docs/COVERAGE_RATCHET.md).
# - Installs simdrive[dev] (which already pins pytest-cov, moto[s3], hypothesis).

on:
  push:
    branches: [main]
    paths:
      - "simdrive/**"
      - "tests/**"
      - ".github/workflows/simdrive-ci.yml"
  pull_request:
    paths:
      - "simdrive/**"
      - "tests/**"
      - ".github/workflows/simdrive-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build native + run unit tests + coverage gate
    runs-on: macos-14  # arm64 runner; supports universal2 cross-compile
    defaults:
      run:
        working-directory: simdrive

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Xcode tools available
        run: |
          xcrun --show-sdk-path
          ls /Applications/Xcode*.app/Contents/Developer/Library/PrivateFrameworks/SimulatorKit.framework

      - name: Build native HID helper (universal2)
        run: cd native && make clean && make

      - name: Verify universal2 binary
        run: |
          file src/simdrive/_bin/simdrive-input
          file src/simdrive/_bin/simdrive-input | grep -q "universal binary"

      - name: Install simdrive + dev extras (pytest, pytest-cov, moto, hypothesis, ruff)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run non-live tests with coverage gate (ratchet floor on hot-path modules)
        run: |
          pytest tests -m "not live" -v \
            --cov=simdrive.server \
            --cov=simdrive.session \
            --cov=simdrive.recorder \
            --cov=simdrive.observe \
            --cov=simdrive.act \
            --cov=simdrive.sim \
            --cov=simdrive.device \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=65  # Ratchet floor — see INIT-2026-549 W2 task: climb to 80 on hot paths

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simdrive-coverage-${{ github.sha }}
          path: simdrive/coverage.xml
          retention-days: 14

      - name: Build wheel
        env:
          SIMDRIVE_SKIP_NATIVE_BUILD: "1"  # we already built it
        run: |
          pip install build
          python -m build --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: simdrive-wheel-${{ github.sha }}
          path: simdrive/dist/*.whl
          retention-days: 14
