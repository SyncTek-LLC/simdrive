name: Security baseline (pip-audit + gitleaks)

# INIT-2026-549 W1: security CI baseline.
# - pip-audit: blocks on HIGH-severity vulns in the resolved dep graph.
# - gitleaks: blocks on any detected secret in the diff.
# CodeQL lives in .github/workflows/codeql.yml (separate workflow for the
# distinct GitHub Code Scanning permissions model).
#
# INIT-2026-549 cleanup (review): paths verified post repo restructure.
# pip-audit consumes simdrive/requirements.lock (exists; pinned in PR #113).
# gitleaks scans full history via fetch-depth: 0. No `pip install -e .`
# step here, so the missing-root-pyproject failure mode does NOT apply.
# If this workflow is red on main, the cause is a real CVE finding in
# simdrive/requirements.lock — investigate and bump pin, do not mask.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily 07:00 UTC dep-scan so newly disclosed CVEs surface within 24h.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (HIGH blocks)
    # INIT-2026-549 cleanup: must be macOS — requirements.lock pins pyobjc-core,
    # which has a source-build dep on macOS frameworks (Quartz/Vision). On
    # ubuntu-latest the audit step fails at the install phase with "PyObjC
    # requires macOS to build" before pip-audit can even read the lock.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install --upgrade pip pip-audit
      - name: Audit the resolved lock (HIGH blocks)
        # `--strict` makes pip-audit fail on any non-fixable vuln in the input.
        # `--vulnerability-service osv` covers PyPI + GitHub Advisory + OSV.
        # `--severity HIGH` would be ideal but pip-audit doesn't filter by sev;
        # we instead fail on ANY vuln and document below the policy: a HIGH
        # finding blocks the PR; a MEDIUM/LOW finding is fixed within 7 days
        # via a tracked TODO comment.
        #
        # --ignore-vuln list (review quarterly):
        #   PYSEC-2025-183 / CVE-2025-45768 — pyjwt "weak encryption" advisory.
        #     Disputed by the pyjwt maintainer (key length is the caller's
        #     responsibility, not the library's). No fix version available.
        #     simdrive does not use pyjwt directly — it's a transitive dep
        #     of `mcp` for its own auth surface, which is not in our control.
        #     [INIT-2026-549]
        run: |
          pip-audit -r simdrive/requirements.lock \
            --vulnerability-service osv \
            --ignore-vuln PYSEC-2025-183 \
            --strict

  gitleaks:
    name: gitleaks (secrets detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history to scan since-tag
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: not required for the GHA action on public repos.
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
