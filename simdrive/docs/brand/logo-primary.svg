<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="SpecterQA — agent picks a pixel, SpecterQA taps it">
  <title>SpecterQA</title>
  <desc>Pixel pin mark: a 4×4 light-gray pixel grid, black crosshairs through one cell, a vivid red tap-pin at the intersection. Wordmark "SpecterQA" in monospace, with weight-600 "Specter" and weight-400 "QA".</desc>

  <g transform="translate(80, 80)">
    <g fill="#E5E5E5">
      <rect x="0"   y="0"   width="36" height="36"/>
      <rect x="40"  y="0"   width="36" height="36"/>
      <rect x="80"  y="0"   width="36" height="36"/>
      <rect x="120" y="0"   width="36" height="36"/>
      <rect x="0"   y="40"  width="36" height="36"/>
      <rect x="40"  y="40"  width="36" height="36"/>
      <rect x="80"  y="40"  width="36" height="36"/>
      <rect x="120" y="40"  width="36" height="36"/>
      <rect x="0"   y="80"  width="36" height="36"/>
      <rect x="40"  y="80"  width="36" height="36"/>
      <rect x="80"  y="80"  width="36" height="36"/>
      <rect x="120" y="80"  width="36" height="36"/>
      <rect x="0"   y="120" width="36" height="36"/>
      <rect x="40"  y="120" width="36" height="36"/>
      <rect x="80"  y="120" width="36" height="36"/>
      <rect x="120" y="120" width="36" height="36"/>
    </g>

    <g stroke="#0A0A0A" stroke-width="2" stroke-linecap="round">
      <line x1="-16" y1="98" x2="172" y2="98"/>
      <line x1="98"  y1="-16" x2="98" y2="172"/>
    </g>

    <circle cx="98" cy="98" r="14" fill="#FF3D2E"/>
  </g>

  <text x="300" y="160"
        font-family="'JetBrains Mono', 'Berkeley Mono', 'IBM Plex Mono', 'Menlo', monospace"
        font-size="120"
        fill="#0A0A0A"
        letter-spacing="-2"
        dominant-baseline="central">
    <tspan font-weight="600">Specter</tspan><tspan font-weight="400">QA</tspan>
  </text>
</svg>
