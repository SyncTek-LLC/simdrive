<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="simdrive">
  <title>simdrive</title>
  <desc>Favicon-scale variant: crosshair + tap pin, grid simplified for legibility at 16×16 and below.</desc>

  <g stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round">
    <line x1="2" y1="16" x2="30" y2="16"/>
    <line x1="16" y1="2" x2="16" y2="30"/>
  </g>
  <circle cx="16" cy="16" r="5" fill="#FF3D2E"/>
</svg>
