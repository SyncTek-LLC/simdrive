schema_version: 1
name: email-password-login
persona: power_user
target: simulator
app_bundle_id: io.synctek.lapsapp
tags:
  - oauth
  - feature_area_2
  - email_password
  - uitextfield_focus

goals:
  - Navigate to the Auth tab
  - Tap the email field (identifier auth_email_field) and type a valid email address
  - Tap the password field (identifier auth_password_field) and type a valid password
  - Tap the Sign In button (identifier auth_email_signin_button)
  - Verify authenticated state with mock_email_ prefixed token

success_criteria:
  - text_visible: Signed in via Email
  - no_crash: true

budget:
  max_steps: 20
  max_seconds: 120
  max_llm_calls: 25
