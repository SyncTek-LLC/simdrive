name: LapsApp
options:
  bundleIdPrefix: io.synctek
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupOrdering:
    - order: [App, Features, Shared]

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  LapsApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.synctek.lapsapp
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: "NO"
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleName: LapsApp
        CFBundleDisplayName: LapsApp
        CFBundleIdentifier: io.synctek.lapsapp
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

  LapsAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/SettingsTests
      - path: Tests/AppearanceTests
      - path: Tests/SearchTests
      - path: Tests/OAuthTests
      - path: Tests/ReaderTests
      - path: Tests/ActivitiesTests
      - path: Tests/FormsTests
      - path: Tests/SheetsTests
      - path: Tests/PerfStressTests
      - path: Tests/OfflineTests
      - path: Tests/MultiAppTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.synctek.lapsapp.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LapsApp.app/LapsApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: LapsApp

  LapsAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/UITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.synctek.lapsapp.uitests
        TEST_TARGET_NAME: LapsApp
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: LapsApp
