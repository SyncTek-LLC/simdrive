name: Example Reader iOS
platform: ios_simulator
bundle_id: com.example.reader
device: "iPhone 16e"
simulator_id: "F600DA91-0B44-4467-9EA1-9FDB8CC94504"

viewport:
  width: 375
  height: 667

launch_args:
  - "-UITesting"

launch_env:
  CFNETWORK_DIAGNOSTICS: "3"

log_subsystem: "com.example.reader"

cost_limit_per_run: 5.00
max_iterations: 50

app_context: |
  Example Reader is a free library reading app. Users can browse library
  catalogs (OPDS feeds), borrow ebooks and audiobooks, read/listen to
  content, manage holds, and switch between multiple library accounts.

  Key screens: Catalog, My Books, Reservations, Settings, Account
  Authentication: Basic, OIDC, SAML, Clever
  Content types: EPUB, PDF, Audiobook
  DRM: Adobe ACS, LCP, Axis 360
